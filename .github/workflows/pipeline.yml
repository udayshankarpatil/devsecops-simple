name: Cloud-CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim # The exact same base as your Dockerfile
    steps:
      - uses: actions/checkout@v4
      - run: pip install .[dev] # Uses your pyproject.toml

  ci-and-update-git:
    runs-on: ubuntu-latest  # Standard GitHub Cloud Runner
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/dummy-app:${{ github.sha }}
          docker build -t $IMAGE_ID ./app
          docker push $IMAGE_ID

      - name: Update Manifest
        run: |
          sed -i "s|image: .*|image: ghcr.io/${{ github.repository_owner }}/dummy-app:${{ github.sha }}|g" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image to ${{ github.sha }}"
          git push
